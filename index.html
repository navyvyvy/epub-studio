<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB STUDIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jschardet/3.0.0/jschardet.min.js"></script>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #6366f1; --accent: #818cf8;
            --border: #2d334a; --text: #f8fafc; --text-dim: #94a3b8;
            --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
            --scroll-track: #0d111d; --scroll-thumb: #2d334a;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); font-family: 'Pretendard', system-ui, sans-serif; color: var(--text); }
        body { display: flex; justify-content: center; align-items: center; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scroll-track); }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .container {
            background: var(--card); width: 700px; height: 920px;
            display: flex; flex-direction: column; padding: 25px;
            border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin: 0; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; }
        h2 span { color: var(--primary); }

        .config-section {
            background: rgba(255,255,255,0.02); border-radius: 16px;
            border: 1px solid var(--border); padding: 18px; margin-bottom: 15px;
        }
        .options-bar {
            display: flex; gap: 18px; margin-bottom: 12px; font-size: 0.85rem;
            border-bottom: 1px solid var(--border); padding-bottom: 12px;
        }
        .option-item { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }

        .regex-area { transition: 0.3s; }
        .regex-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .regex-label { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
        #regexStatus { font-size: 0.75rem; color: var(--success); font-weight: bold; }
        #regexInput {
            background: #0b0f1a; border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); padding: 10px 14px; font-family: 'Fira Code', monospace;
            font-size: 0.8rem; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px;
        }

        .regex-guide { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .sample-tag { font-size: 0.65rem; background: #2d334a; color: var(--text-dim); padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .sample-tag:hover { border-color: var(--primary); color: var(--text); }
        .sample-tag.tag-all { background: var(--primary); color: white; }

        .file-list-area {
            flex-grow: 1; overflow: hidden; background: #0d111d;
            border-radius: 16px; border: 2px dashed var(--border);
            margin-bottom: 20px; position: relative; transition: 0.3s;
            cursor: pointer; display: flex; flex-direction: column;
        }
        .file-list-area.drag-over { border-color: var(--primary); background: rgba(99,102,241,0.1); border-style: solid; }

        .table-wrapper { display: none; flex-direction: column; height: 100%; width: 100%; }
        .table-wrapper.active { display: flex; }

        .file-table-header { width: 100%; border-collapse: collapse; table-layout: fixed; background: #1c2336; z-index: 2; }
        .file-table-header th { padding: 12px; color: var(--text-dim); font-size: 0.8rem; border-bottom: 1px solid var(--border); }

        .table-scroll-box { flex-grow: 1; overflow-y: auto; overflow-x: hidden; width: 100%; }
        .file-table-body { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 0.8rem; }
        .file-table-body td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; background: #0d111d; }

        .col-title { text-align: left; padding-left: 15px; }
        .col-enc { width: 90px; text-align: center; }
        .col-valid { width: 85px; text-align: center; }
        .col-status { width: 85px; text-align: center; }
        .col-action { width: 70px; text-align: center; }

        .title-input { background: none; border: none; color: var(--text); width: 100%; outline: none; font-size: 0.8rem; }
        .btn-header-action { background: none; border: 1px solid var(--border); color: var(--text-dim); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-header-action:hover { border-color: var(--accent); color: var(--text); }

        .valid-icon { font-size: 1rem; font-weight: bold; }
        .valid-ok { color: var(--success); }
        .valid-no { color: var(--danger); font-style: normal; }

        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .badge-wait { background: #2d334a; color: var(--text-dim); }
        .badge-done { background: rgba(34, 197, 94, 0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-stop { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }

        .empty-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--text-dim); font-size: 0.9rem; text-align: center; pointer-events: none; line-height: 1.6;
        }

        .add-more-hint { padding: 12px; text-align: center; color: var(--accent); font-size: 0.75rem; font-weight: bold; background: rgba(0,0,0,0.2); }

        .controls { display: flex; gap: 12px; }
        .btn-start { flex: 1; height: 55px; background: var(--primary); border: none; border-radius: 14px; font-weight: 800; cursor: pointer; color: white; font-size: 1rem; transition: 0.3s; }
        .btn-start:hover { background: var(--accent); transform: translateY(-2px); }
        .btn-start:disabled { background: #2d334a; cursor: not-allowed; transform: none; }
        .btn-stop { width: 80px; height: 55px; background: transparent; border: 2px solid var(--danger); border-radius: 14px; font-weight: 700; color: var(--danger); cursor: pointer; display: none; }

        #status { margin-top: 15px; font-size: 0.85rem; text-align: center; color: var(--text-dim); min-height: 1.2rem; }
        .progress-bar { height: 6px; background: #2d334a; border-radius: 3px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><span>EPUB</span> STUDIO</h2>
    </div>

    <div class="config-section">
        <div class="options-bar">
            <label class="option-item"><input type="checkbox" id="optTrim" checked> 공백 정제</label>
            <label class="option-item"><input type="checkbox" id="optToc" checked> 목차 자동 추출</label>
            <label class="option-item"><input type="checkbox" id="optZip"> 완료 후 ZIP 압축</label>
        </div>
        <div class="regex-area" id="regexContainer">
            <div class="regex-label-row">
                <div class="regex-label">목차 추출 정규식 (줄 단위 매칭)</div>
                <div id="regexStatus">파일을 추가해 주세요</div>
            </div>
            <input type="text" id="regexInput" value="^\s*(([<【〔]\s*(\d+[\.\s화]|제?\s*\d+화|자기\s*소개|프롤로그|에필로그|공지|작가).*?[>】〕])|제?\s*\d+화.*?|Chapter\s*\d+.*?|^#\d+$|(?!\d+\.?\d*[MK]\b)\d+[\s\.화][가-힣A-Z].{1,25}(?<![\.\?\!·다자죠요\]\s])(?<!···)$|\(\d+\)$)\s*$">
            <div class="regex-guide">
                <span class="sample-tag tag-all" data-val="^\s*(([<【〔]\s*(\d+[\.\s화]|제?\s*\d+화|자기\s*소개|프롤로그|에필로그|공지|작가).*?[>】〕])|제?\s*\d+화.*?|Chapter\s*\d+.*?|^#\d+$|(?!\d+\.?\d*[MK]\b)\d+[\s\.화][가-힣A-Z].{1,25}(?<![\.\?\!·다자죠요\]\s])(?<!···)$|\(\d+\)$)\s*$">전체 통합 패턴</span>
                <span class="sample-tag" data-val="^\s*[<【〔].*?[>】〕]\s*$">특수 괄호 (【001】 또는 <공지>)</span>
                <span class="sample-tag" data-val="^\s*제?\s*\d+\s*화.*$">제~화 (제 10화. 본문 시작)</span>
                <span class="sample-tag" data-val="^\s*Chapter\s*\d+.*$">영문 챕터 (Chapter 1. Origin)</span>
                <span class="sample-tag" data-val="^\s*#\d+$\s*">단순 넘버링 (#123)</span>
                <span class="sample-tag" data-val="^\s*\d+[\s\.화][가-힣A-Z].{1,25}$\s*">일반 제목 (1. 새로운 시작)</span>
                <span class="sample-tag" data-val="^\s*\(\d+\)$\s*">단순 괄호 숫자 ((1))</span>
            </div>
        </div>
    </div>

    <div class="file-list-area" id="dropZone">
        <div class="empty-msg" id="emptyMsg">텍스트 파일을 이곳에 드래그하거나<br>클릭하여 파일을 추가하세요</div>
        <div class="table-wrapper" id="tableWrapper">
            <table class="file-table-header">
                <thead>
                    <tr>
                        <th class="col-title" id="sortHeader" style="cursor:pointer;">도서 제목 ↕</th>
                        <th class="col-enc">인코딩</th>
                        <th class="col-valid">제목 감지</th>
                        <th class="col-status">상태</th>
                        <th class="col-action">
                            <div style="display:flex; gap:4px; justify-content:center;">
                                <button id="clearDoneBtn" class="btn-header-action" title="완료 제거">✓</button>
                                <button id="clearAllBtn" class="btn-header-action" title="전체 제거">✕</button>
                            </div>
                        </th>
                    </tr>
                </thead>
            </table>
            <div class="table-scroll-box">
                <table class="file-table-body">
                    <tbody id="fileTbody"></tbody>
                </table>
            </div>
            <div id="addMoreHint" class="add-more-hint">+ 드래그하거나 클릭하여 파일 추가</div>
        </div>
    </div>

    <input type="file" id="fileInput" multiple accept=".txt" style="display:none">

    <div class="controls">
        <button class="btn-start" id="convertBtn">EPUB 변환 시작</button>
        <button class="btn-stop" id="stopBtn">중단</button>
    </div>

    <div id="status">파일을 대기 중입니다.</div>
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
</div>

<script>
    let fileQueue = [];
    let isProcessing = false;
    let shouldStop = false;
    let currentSortDir = 'none';

    const elements = {
        fileInput: document.getElementById('fileInput'), dropZone: document.getElementById('dropZone'),
        fileTbody: document.getElementById('fileTbody'), tableWrapper: document.getElementById('tableWrapper'),
        emptyMsg: document.getElementById('emptyMsg'), addMoreHint: document.getElementById('addMoreHint'),
        convertBtn: document.getElementById('convertBtn'), stopBtn: document.getElementById('stopBtn'),
        regexInput: document.getElementById('regexInput'), regexContainer: document.getElementById('regexContainer'),
        optToc: document.getElementById('optToc'), statusText: document.getElementById('status'),
        progFill: document.getElementById('progFill'), progBar: document.getElementById('progBar'),
        regexStatus: document.getElementById('regexStatus')
    };

    function resetStatusUI() {
        elements.statusText.innerText = "파일을 대기 중입니다.";
        elements.progBar.style.display = 'none';
        elements.progFill.style.width = '0%';
        isProcessing = false;
        elements.convertBtn.disabled = false;
        elements.stopBtn.style.display = 'none';
    }

    elements.optToc.onchange = () => {
        const active = elements.optToc.checked;
        elements.regexInput.disabled = !active;
        elements.regexContainer.style.opacity = active ? "1" : "0.3";
        elements.regexContainer.style.pointerEvents = active ? "auto" : "none";
        validateAllFiles();
    };

    document.querySelectorAll('.sample-tag').forEach(tag => {
        tag.onclick = () => { elements.regexInput.value = tag.getAttribute('data-val'); validateAllFiles(); };
    });

    elements.regexInput.oninput = () => validateAllFiles();

    elements.dropZone.onclick = (e) => {
        if (e.target.closest('.btn-header-action') || e.target.closest('.title-input') || e.target.closest('select') || e.target.closest('button')) return;
        elements.fileInput.click();
    };

    elements.dropZone.ondragover = (e) => { e.preventDefault(); elements.dropZone.classList.add('drag-over'); };
    elements.dropZone.ondragleave = () => elements.dropZone.classList.remove('drag-over');
    elements.dropZone.ondrop = (e) => { e.preventDefault(); elements.dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); };
    elements.fileInput.onchange = (e) => { handleFiles(e.target.files); elements.fileInput.value = ""; };

    async function validateAllFiles() {
        if (fileQueue.length === 0) {
            elements.regexStatus.innerText = "파일을 추가해 주세요";
            return;
        }

        const useToc = elements.optToc.checked;
        const pattern = elements.regexInput.value;
        let re;
        try { re = new RegExp(pattern); } catch(e) { elements.regexStatus.innerText = "정규식 오류"; return; }

        let validCount = 0;
        const promises = fileQueue.map(async (item) => {
            if (!useToc) { item.isValid = 'none'; return; }
            if (item.state === 'done') return;

            const text = await new Promise(res => {
                const r = new FileReader();
                r.onload = e => res(e.target.result.substring(0, 200000));
                r.readAsText(item.file, item.encoding);
            });

            const lines = text.split('\n');
            let found = false;
            for(let i=0; i<lines.length; i++) {
                const line = lines[i].trim();
                if(line && re.test(line) && line.length < 100) {
                    found = true;
                    break;
                }
            }
            item.isValid = found ? 'ok' : 'no';
            if (found) validCount++;
        });

        await Promise.all(promises);

        if (useToc) {
            elements.regexStatus.innerText = `총 ${fileQueue.length}개 중 ${validCount}개 파일에서 제목 감지됨`;
            elements.regexStatus.style.color = (validCount === fileQueue.length) ? "var(--success)" : "var(--warning)";
        } else {
            elements.regexStatus.innerText = "목차 추출 기능 꺼짐";
        }
        renderList();
    }

    async function handleFiles(files) {
        if(!isProcessing) resetStatusUI();
        for (const file of Array.from(files)) {
            if (!file.name.toLowerCase().endsWith('.txt')) continue;
            if (fileQueue.some(item => item.file.name === file.name && item.file.size === file.size)) continue;
            const buffer = await file.slice(0, 32768).arrayBuffer();
            let binary = ""; new Uint8Array(buffer).forEach(b => binary += String.fromCharCode(b));
            let det = jschardet.detect(binary);
            let enc = (det && det.confidence > 0.7) ? det.encoding.toUpperCase() : 'UTF-8';
            if (["EUC-KR", "WINDOWS-1252"].includes(enc)) enc = "CP949";
            fileQueue.push({ file: file, customTitle: file.name.replace(/\.[^/.]+$/, ""), encoding: enc, state: 'wait', isValid: 'none' });
        }
        await validateAllFiles();
    }

    function renderList() {
        const hasFiles = fileQueue.length > 0;
        elements.emptyMsg.style.display = hasFiles ? 'none' : 'block';
        elements.tableWrapper.classList.toggle('active', hasFiles);
        elements.dropZone.style.borderStyle = hasFiles ? 'solid' : 'dashed';
        elements.fileTbody.innerHTML = '';

        fileQueue.forEach((item, i) => {
            const tr = document.createElement('tr');
            let validHtml = '-';
            if (item.isValid === 'ok') validHtml = '<span class="valid-icon valid-ok" title="목차 패턴 감지됨">✓</span>';
            else if (item.isValid === 'no') validHtml = '<span class="valid-icon valid-no" title="패턴을 찾지 못함">!</span>';

            tr.innerHTML = `
                <td class="col-title"><input type="text" class="title-input" value="${item.customTitle}" oninput="fileQueue[${i}].customTitle=this.value"></td>
                <td class="col-enc"><select onchange="fileQueue[${i}].encoding=this.value; validateAllFiles();" style="background:none; border:none; color:var(--accent); font-size:0.75rem; cursor:pointer; outline:none;">
                    ${["UTF-8","CP949","EUC-KR","UTF-16LE"].map(e => `<option value="${e}" ${item.encoding===e?'selected':''}>${e}</option>`).join('')}
                </select></td>
                <td class="col-valid">${validHtml}</td>
                <td class="col-status"><span class="status-badge badge-${item.state}">${item.state==='done'?'Done':'Wait'}</span></td>
                <td class="col-action"><button onclick="event.stopPropagation(); fileQueue.splice(${i},1);renderList();validateAllFiles();" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button></td>
            `;
            elements.fileTbody.appendChild(tr);
        });
    }

    async function createEpub(title, content, useTrim, useAutoToc, userRegex) {
        const zip = new JSZip();
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        zip.folder("META-INF").file("container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

        const rawLines = content.replace(/\r\n/g, '\n').split('\n');
        const chapters = [];
        let currentChapter = { title: "시작", lines: [] };
        const customRegex = useAutoToc ? new RegExp(userRegex) : null;

        for (let i = 0; i < rawLines.length; i++) {
            const line = rawLines[i].trim();
            let isTitle = false;
            if (useAutoToc && line && customRegex.test(line) && line.length < 100) {
                isTitle = true;
            }
            if (isTitle) {
                if (currentChapter.lines.length > 0) chapters.push(currentChapter);
                currentChapter = { title: line, lines: [] };
                continue;
            }
            if (line !== "") currentChapter.lines.push(line);
            else if (useTrim && i + 1 < rawLines.length && rawLines[i+1].trim() === "") {
                currentChapter.lines.push(""); while (i+1 < rawLines.length && rawLines[i+1].trim() === "") i++;
            } else if (!useTrim) currentChapter.lines.push("");
        }
        chapters.push(currentChapter);

        const oebps = zip.folder("OEBPS");
        const manifest = [], spine = [], nav = [], ncx = [];
        chapters.forEach((ch, idx) => {
            const fname = `ch_${idx}.xhtml`;
            const body = ch.lines.map(l => l ? `<p>${l.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}</p>` : `<p><br/></p>`).join('\n');
            const html = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko"><head><title>${ch.title}</title><style>body{font-family:sans-serif;line-height:1.7;padding:5% 7%;word-break:break-all;} h2{border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:20px;}</style></head><body><h2 id="p${idx}">${ch.title}</h2>${body}</body></html>`;
            oebps.file(fname, html);
            manifest.push(`<item id="c${idx}" href="${fname}" media-type="application/xhtml+xml"/>`);
            spine.push(`<itemref idref="c${idx}"/>`);
            nav.push(`<li><a href="${fname}#p${idx}">${ch.title}</a></li>`);
            ncx.push(`<navPoint id="n${idx}" playOrder="${idx+1}"><navLabel><text>${ch.title}</text></navLabel><content src="${fname}"/></navPoint>`);
        });
        oebps.file("nav.xhtml", `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>TOC</title></head><body><nav epub:type="toc"><h1>목차</h1><ol>${nav.join('\n')}</ol></nav></body></html>`);
        oebps.file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="uuid"/><meta name="dtb:depth" content="1"/></head><docTitle><text>${title}</text></docTitle><navMap>${ncx.join('\n')}</navMap></ncx>`);
        oebps.file("content.opf", `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">u${crypto.randomUUID()}</dc:identifier><dc:title>${title}</dc:title><dc:language>ko</dc:language><meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/,"Z")}</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>${manifest.join('\n')}</manifest><spine toc="ncx">${spine.join('\n')}</spine></package>`);
        return await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip", compression: "DEFLATE" });
    }

    elements.convertBtn.onclick = async () => {
        if (isProcessing || fileQueue.length === 0) return;
        isProcessing = true; shouldStop = false;
        elements.convertBtn.disabled = true; elements.stopBtn.style.display = 'block'; elements.progBar.style.display = 'block';
        const regValue = elements.regexInput.value, useTrim = document.getElementById('optTrim').checked,
              useAutoToc = elements.optToc.checked, useZip = document.getElementById('optZip').checked;
        const finalZip = useZip ? new JSZip() : null;
        let count = 0;
        for (let i = 0; i < fileQueue.length; i++) {
            if (shouldStop) break;
            const item = fileQueue[i]; if (item.state === 'done') continue;
            elements.statusText.innerText = `변환 중: ${item.customTitle}`;
            elements.progFill.style.width = `${((i+1)/fileQueue.length)*100}%`;
            try {
                const text = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsText(item.file, item.encoding); });
                const blob = await createEpub(item.customTitle, text, useTrim, useAutoToc, regValue);
                if (useZip) finalZip.file(`${item.customTitle}.epub`, blob);
                else { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${item.customTitle}.epub`; a.click(); }
                item.state = 'done'; count++; renderList();
            } catch (e) { item.state = 'stop'; renderList(); }
        }
        if (useZip && count > 0) {
            const zipBlob = await finalZip.generateAsync({ type: "blob" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(zipBlob); a.download = `EPUB_COLLECTION.zip`; a.click();
        }
        elements.statusText.innerText = shouldStop ? "변환 중단됨" : `✅ 완료 (${count}개)`;
        isProcessing = false; elements.convertBtn.disabled = false; elements.stopBtn.style.display = 'none';
    };

    elements.stopBtn.onclick = () => shouldStop = true;
    document.getElementById('clearDoneBtn').onclick = (e) => { e.stopPropagation(); fileQueue = fileQueue.filter(f => f.state !== 'done'); renderList(); validateAllFiles(); if(!isProcessing) resetStatusUI(); };
    document.getElementById('clearAllBtn').onclick = (e) => { e.stopPropagation(); if (confirm("전체 삭제하시겠습니까?")) { fileQueue = []; renderList(); resetStatusUI(); elements.regexStatus.innerText = "파일을 추가해 주세요"; } };
    document.getElementById('sortHeader').onclick = (e) => { e.stopPropagation(); currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc'; fileQueue.sort((a,b) => a.customTitle.localeCompare(b.customTitle, undefined, {numeric:true}) * (currentSortDir === 'asc' ? 1 : -1)); renderList(); };
</script>
</body>
</html>
