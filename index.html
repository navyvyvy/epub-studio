<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EPUB STUDIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jschardet/3.0.0/jschardet.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --primary: #6366f1; --accent: #818cf8; --border: #2d334a; --text: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444; --success: #22c55e; }
        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); font-family: 'Pretendard', system-ui, sans-serif; color: var(--text); }
        body { display: flex; justify-content: center; align-items: center; }

        .container {
            background: var(--card); width: 620px; height: 720px;
            display: flex; flex-direction: column; padding: 30px;
            border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
        h2 { font-size: 1.1rem; margin: 0; letter-spacing: 3px; font-weight: 800; }
        h2 span { color: var(--primary); }

        .header-btns { display: flex; gap: 8px; }
        .btn-header { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .btn-clear-done { background: rgba(99, 102, 241, 0.1); color: var(--primary); border-color: rgba(99, 102, 241, 0.2); }
        .btn-clear-done:hover { background: var(--primary); color: white; }
        .btn-clear-all { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .btn-clear-all:hover { background: var(--danger); color: white; }
        .btn-header:disabled { opacity: 0.3; cursor: not-allowed; }

        .options-bar { display: flex; gap: 20px; margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); font-size: 0.85rem; justify-content: center; }
        .option-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500; }
        .option-item input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--primary); }

        .drop-zone { border: 2px dashed var(--border); height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 16px; text-align: center; cursor: pointer; color: var(--text-dim); transition: all 0.2s ease; margin-bottom: 15px; flex-shrink: 0; font-size: 0.85rem; }
        .drop-zone.drag-over { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); color: var(--text); }

        .file-list-area { flex-grow: 1; margin-bottom: 15px; overflow-y: auto; background: #0d111d; border-radius: 12px; border: 1px solid var(--border); }
        .file-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .file-table th { padding: 10px; background: #1c2336; color: var(--text-dim); text-align: left; position: sticky; top: 0; z-index: 10; }
        .file-table td { padding: 10px; border-bottom: 1px solid var(--border); }

        .title-input { width: 95%; background: transparent; border: none; color: var(--text); outline: none; border-bottom: 1px solid transparent; font-size: 0.8rem; }
        .title-input:focus { border-bottom-color: var(--primary); }

        .encoding-select { background: transparent; color: var(--accent); border: none; font-size: 0.75rem; cursor: pointer; outline: none; }
        .encoding-select option { background: var(--card); color: var(--text); }

        .status-badge { font-size: 0.7rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; }
        .badge-wait { color: var(--text-dim); border: 1px solid var(--border); }
        .badge-done { color: var(--success); border: 1px solid var(--success); }
        .badge-stop { color: var(--danger); border: 1px solid var(--danger); }

        .controls { display: flex; gap: 10px; flex-shrink: 0; }
        .btn-start { flex: 3; height: 50px; background: var(--primary); border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-start:hover { background: var(--accent); }
        .btn-start:disabled { background: #2d334a; color: var(--text-dim); cursor: not-allowed; }
        .btn-stop { flex: 1; height: 50px; background: transparent; border: 2px solid var(--danger); border-radius: 12px; font-weight: 700; cursor: pointer; color: var(--danger); display: none; }

        #status { margin-top: 12px; font-size: 0.85rem; text-align: center; color: var(--text-dim); min-height: 1.2rem; font-weight: 600; }
        .progress-bar { height: 4px; background: #2d334a; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><span>EPUB</span> STUDIO</h2>
        <div class="header-btns">
            <button class="btn-header btn-clear-done" id="clearDoneBtn">완료 항목 제거</button>
            <button class="btn-header btn-clear-all" id="clearBtn">전체 초기화</button>
        </div>
    </div>

    <div class="options-bar">
        <label class="option-item"><input type="checkbox" id="optTrim" checked> 공백 중복 제거</label>
        <label class="option-item"><input type="checkbox" id="optZip"> 완료 후 ZIP 일괄 압축</label>
    </div>

    <div class="drop-zone" id="dropZone">
        텍스트 파일을 드래그하거나 클릭하세요
        <input type="file" id="fileInput" multiple accept=".txt" style="display:none">
    </div>

    <div class="file-list-area">
        <table class="file-table">
            <thead>
                <tr>
                    <th>도서 제목</th>
                    <th style="width: 110px;">인코딩 설정</th>
                    <th style="width: 70px; text-align: center;">상태</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="fileTbody"></tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn-start" id="convertBtn">변환 시작</button>
        <button class="btn-stop" id="stopBtn">중단</button>
    </div>
    <div id="status">대기 중...</div>
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
</div>

<script>
    let fileQueue = [];
    let isProcessing = false;
    let shouldStop = false;
    const ENCODING_LIST = ["UTF-8", "CP949", "EUC-KR", "UTF-16LE", "UTF-16BE", "SHIFT-JIS", "ISO-8859-1", "WINDOWS-1252"];

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileTbody = document.getElementById('fileTbody');
    const convertBtn = document.getElementById('convertBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearDoneBtn = document.getElementById('clearDoneBtn');
    const progBar = document.getElementById('progBar');
    const progFill = document.getElementById('progFill');
    const statusText = document.getElementById('status');
    const optTrim = document.getElementById('optTrim');
    const optZip = document.getElementById('optZip');

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
        dropZone.addEventListener(ev, preventDefaults);
        document.body.addEventListener(ev, preventDefaults);
    });

    dropZone.addEventListener('dragover', () => { if(!isProcessing) dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
        if (isProcessing) return;
        dropZone.classList.remove('drag-over');
        resetStatusUI(); // 새 파일 추가 시 UI 리셋
        handleFiles(e.dataTransfer.files);
    });

    dropZone.onclick = () => { if(!isProcessing) fileInput.click(); };
    fileInput.onchange = (e) => { if (e.target.files.length > 0) { resetStatusUI(); handleFiles(e.target.files); fileInput.value = ""; } };

    // UI 하단 상태바 초기화 함수
    function resetStatusUI() {
        statusText.style.color = "var(--text-dim)";
        statusText.innerText = "대기 중...";
        progBar.style.display = "none";
        progFill.style.width = "0%";
    }

    clearDoneBtn.onclick = () => {
        if (isProcessing) return;
        fileQueue = fileQueue.filter(f => f.state !== 'done');
        renderList();
        if(fileQueue.length === 0) resetStatusUI();
    };

    clearBtn.onclick = () => {
        if (isProcessing) return;
        if (fileQueue.length > 0 && confirm("리스트를 전체 비우시겠습니까?")) {
            fileQueue = [];
            resetStatusUI();
            renderList();
        }
    };

    async function handleFiles(files) {
        const fileList = Array.from(files);
        let skippedCount = 0;
        for (const file of fileList) {
            if (!file.name.toLowerCase().endsWith('.txt')) continue;
            if (fileQueue.some(f => f.file.name === file.name && f.file.size === file.size)) { skippedCount++; continue; }
            const buffer = await file.slice(0, 32768).arrayBuffer();
            let binary = "";
            new Uint8Array(buffer).forEach(b => binary += String.fromCharCode(b));
            let detected = jschardet.detect(binary);
            let enc = (detected && detected.confidence > 0.7) ? detected.encoding.toUpperCase() : 'UTF-8';
            if (["IBM866", "WINDOWS-1252", "ISO-8859-1", "EUC-KR"].includes(enc)) enc = "CP949";

            fileQueue.push({ file: file, customTitle: file.name.replace(/\.[^/.]+$/, ""), encoding: ENCODING_LIST.includes(enc) ? enc : 'UTF-8', state: 'wait' });
        }
        renderList();
        if(skippedCount > 0) alert(`${skippedCount}개의 중복 파일은 제외되었습니다.`);
    }

    function renderList() {
        fileTbody.innerHTML = '';
        fileQueue.forEach((item, index) => {
            const tr = document.createElement('tr');
            let badge = `<span class="status-badge badge-wait">대기</span>`;
            if (item.state === 'done') badge = `<span class="status-badge badge-done">완료</span>`;
            if (item.state === 'stop') badge = `<span class="status-badge badge-stop">중단</span>`;
            tr.innerHTML = `
                <td><input type="text" class="title-input" value="${item.customTitle}" oninput="fileQueue[${index}].customTitle=this.value" ${isProcessing ? 'disabled' : ''}></td>
                <td><select class="encoding-select" onchange="fileQueue[${index}].encoding=this.value" ${isProcessing ? 'disabled' : ''}>
                    ${ENCODING_LIST.map(e => `<option value="${e}" ${item.encoding === e ? 'selected' : ''}>${e}</option>`).join('')}
                </select></td>
                <td style="text-align:center;">${badge}</td>
                <td><button onclick="removeFile(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer;" ${isProcessing ? 'disabled' : ''}>✕</button></td>
            `;
            fileTbody.appendChild(tr);
        });
        if (!isProcessing && fileQueue.length > 0) statusText.innerText = `${fileQueue.length}개 파일 로드됨`;
    }

    function removeFile(index) {
        if (isProcessing) return;
        fileQueue.splice(index, 1);
        renderList();
        if(fileQueue.length === 0) resetStatusUI();
    }

    async function createEpub(title, content, useTrim) {
        const zip = new JSZip();
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        zip.folder("META-INF").file("container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);
        const rawLines = content.replace(/\r\n/g, '\n').split('\n');
        const processedLines = [];
        for (let i = 0; i < rawLines.length; i++) {
            const currentLine = rawLines[i].trim();
            if (currentLine !== "") { processedLines.push(currentLine); }
            else if (useTrim) {
                if (i + 1 < rawLines.length && rawLines[i + 1].trim() === "") {
                    processedLines.push("");
                    while (i + 1 < rawLines.length && rawLines[i + 1].trim() === "") i++;
                }
            } else { processedLines.push(""); }
        }
        let bodyHtml = processedLines.map(l => l ? `<p style="text-indent:0; margin:0.3em 0; text-align:justify;">${l.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}</p>` : `<p><br/></p>`).join('\n');
        const xhtml = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko"><head><meta charset="UTF-8" /><title>Book</title><style>body { font-family: sans-serif; line-height: 1.7; padding: 5%; word-break: break-all; } p { margin: 0; padding: 0; }</style></head><body><h1>${title}</h1>${bodyHtml}</body></html>`;
        const oebps = zip.folder("OEBPS");
        oebps.file("text.xhtml", xhtml);
        oebps.file("nav.xhtml", `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>Nav</title></head><body><nav epub:type="toc" id="toc"><ol><li><a href="text.xhtml">Start</a></li></ol></nav></body></html>`);
        const opf = `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="id" version="3.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="id">urn:uuid:${crypto.randomUUID()}</dc:identifier><dc:title>${title}</dc:title><dc:language>ko</dc:language><meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/, "Z")}</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/><item id="text" href="text.xhtml" media-type="application/xhtml+xml"/></manifest><spine><itemref idref="text"/></spine></package>`;
        oebps.file("content.opf", opf);
        return await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip", compression: "DEFLATE" });
    }

    convertBtn.onclick = async () => {
        if (fileQueue.length === 0 || isProcessing) return;
        isProcessing = true;
        shouldStop = false;
        let successCount = 0;
        const useTrim = optTrim.checked;
        const useZip = optZip.checked;
        const finalZip = useZip ? new JSZip() : null;

        convertBtn.disabled = true;
        clearBtn.disabled = true;
        clearDoneBtn.disabled = true;
        stopBtn.style.display = 'block';
        progBar.style.display = 'block';
        fileQueue.forEach(f => { if(f.state !== 'done') f.state = 'wait'; });

        for (let i = 0; i < fileQueue.length; i++) {
            if (shouldStop) break; // 중단 시 루프 탈출

            const item = fileQueue[i];
            if (item.state === 'done') continue;

            statusText.style.color = "var(--text)";
            statusText.innerText = `🔄 변환 중 (${i+1}/${fileQueue.length}): ${item.customTitle}`;
            progFill.style.width = Math.round(((i + 1) / fileQueue.length) * 100) + '%';

            try {
                const rawText = await new Promise((res) => {
                    const r = new FileReader();
                    r.onload = (e) => res(e.target.result || "");
                    r.readAsText(item.file, item.encoding);
                });
                const blob = await createEpub(item.customTitle, rawText, useTrim);
                if (useZip) { finalZip.file(`${item.customTitle}.epub`, blob); }
                else {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob); a.download = `${item.customTitle}.epub`; a.click(); URL.revokeObjectURL(a.href);
                }
                item.state = 'done';
                successCount++;
                renderList();
            } catch (err) { item.state = 'stop'; renderList(); }
            await new Promise(res => setTimeout(res, 50));
        }

        // 중단되든 완료되든, ZIP 체크되어 있고 성공 파일이 있다면 다운로드
        if (useZip && successCount > 0) {
            statusText.innerText = shouldStop ? "📦 중단 전까지 완료된 파일 압축 중..." : "📦 전체 완료 파일 압축 중...";
            const zipBlob = await finalZip.generateAsync({ type: "blob" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(zipBlob);
            a.download = `EPUB_PACK_${new Date().getTime()}.zip`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // 중단 상태 표기 처리
        if (shouldStop) {
            fileQueue.forEach(f => { if(f.state === 'wait') f.state = 'stop'; });
            renderList();
            statusText.innerText = `⏹ 중단됨: ${successCount}개 파일 압축/저장 완료`;
            statusText.style.color = 'var(--danger)';
        } else {
            statusText.innerText = `✅ 변환 성공: 총 ${successCount}개 파일 완료!`;
            statusText.style.color = 'var(--success)';
        }

        isProcessing = false;
        convertBtn.disabled = false;
        clearBtn.disabled = false;
        clearDoneBtn.disabled = false;
        stopBtn.style.display = 'none';
    };

    stopBtn.onclick = () => { shouldStop = true; statusText.innerText = "중단 요청 중 (현재 작업 완료 후 저장)..."; };
</script>
</body>
</html>
