<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EPUB STUDIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jschardet/3.0.0/jschardet.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --primary: #6366f1; --accent: #818cf8; --border: #2d334a; --text: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444; --success: #22c55e; }
        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); font-family: 'Pretendard', system-ui, sans-serif; color: var(--text); }
        body { display: flex; justify-content: center; align-items: center; }
        .container { background: var(--card); width: 640px; height: 800px; display: flex; flex-direction: column; padding: 25px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); box-sizing: border-box; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 1.1rem; margin: 0; letter-spacing: 3px; font-weight: 800; }
        h2 span { color: var(--primary); }

        .config-section { background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
        .options-bar { display: flex; gap: 15px; margin-bottom: 12px; font-size: 0.85rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .option-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }

        .regex-bar { display: flex; flex-direction: column; gap: 8px; transition: opacity 0.3s; }
        .regex-bar.disabled { opacity: 0.3; pointer-events: none; }
        .regex-label { font-size: 0.75rem; color: var(--accent); font-weight: 700; display: flex; justify-content: space-between; }
        #regexInput { background: #0b0f1a; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-family: monospace; font-size: 0.8rem; outline: none; width: 100%; box-sizing: border-box; }

        .regex-presets { display: flex; gap: 5px; margin-top: 4px; }
        .btn-preset { font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; background: var(--border); color: var(--text-dim); border: none; cursor: pointer; }
        .btn-preset:hover:not(:disabled) { background: var(--primary); color: white; }

        .drop-zone { border: 2px dashed var(--border); height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: var(--text-dim); cursor: pointer; margin-bottom: 15px; font-size: 0.85rem; transition: 0.2s; }
        .drop-zone.drag-over { border-color: var(--primary); background: rgba(99,102,241,0.1); color: var(--text); }

        .file-list-area { flex-grow: 1; overflow-y: auto; background: #0d111d; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .file-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .file-table th { padding: 10px; background: #1c2336; color: var(--text-dim); text-align: left; position: sticky; top: 0; }
        .file-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }

        .controls { display: flex; gap: 10px; }
        .btn-start { flex: 3; height: 50px; background: var(--primary); border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; }
        .btn-stop { flex: 1; height: 50px; background: transparent; border: 2px solid var(--danger); border-radius: 12px; font-weight: 700; color: var(--danger); cursor: pointer; display: none; }
        #status { margin-top: 10px; font-size: 0.8rem; text-align: center; color: var(--text-dim); min-height: 1.2rem; }
        .progress-bar { height: 4px; background: #2d334a; border-radius: 2px; margin-top: 5px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><span>EPUB</span> STUDIO</h2>
        <button id="clearDoneBtn" style="font-size:0.7rem; background:none; border:1px solid var(--border); color:var(--text-dim); padding:4px 8px; border-radius:6px; cursor:pointer;">완료 제거</button>
    </div>

    <div class="config-section">
        <div class="options-bar">
            <label class="option-item"><input type="checkbox" id="optTrim" checked> 공백 정제</label>
            <label class="option-item"><input type="checkbox" id="optToc" checked> 자동 목차 추출</label>
            <label class="option-item"><input type="checkbox" id="optZip"> 완료 후 ZIP 압축</label>
        </div>
        <div class="regex-bar" id="regexContainer">
            <div class="regex-label">
                <span>목차 인식 정규식 패턴</span>
                <span id="regexStatus" style="color:var(--success); font-size:0.65rem;">정상</span>
            </div>
            <input type="text" id="regexInput" value="^\s*(제?\s*\d+\s*[장화권]|Chapter\s*\d+|#\d+)(\s|\.|$)">
            <div class="regex-presets">
                <button class="btn-preset" data-reg="^\s*(제?\s*\d+\s*[장화권]|Chapter\s*\d+|#\d+)(\s|\.|$)">기본</button>
                <button class="btn-preset" data-reg="^\s*(제?\s*\d+\s*[장화권])">제 n화</button>
                <button class="btn-preset" data-reg="^\s*(Chapter\s*\d+)">Chapter</button>
                <button class="btn-preset" data-reg="^\s*#\d+">#기호</button>
                <button class="btn-preset" data-reg="^\s*\d+[\.\s]">숫자만</button>
            </div>
        </div>
    </div>

    <div class="drop-zone" id="dropZone">텍스트 파일을 여기에 드래그하거나 클릭하세요</div>
    <input type="file" id="fileInput" multiple accept=".txt" style="display:none">

    <div class="file-list-area">
        <table class="file-table">
            <thead>
                <tr>
                    <th style="cursor:pointer;" id="sortHeader">도서 제목 ↕</th>
                    <th style="width: 100px;">인코딩</th>
                    <th style="width: 60px; text-align: center;">상태</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="fileTbody"></tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn-start" id="convertBtn">EPUB 변환 시작</button>
        <button class="btn-stop" id="stopBtn">중단</button>
    </div>
    <div id="status">대기 중...</div>
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
</div>

<script>
    let fileQueue = [];
    let isProcessing = false;
    let shouldStop = false;
    let currentSortDir = 'none';

    const fileInput = document.getElementById('fileInput'), dropZone = document.getElementById('dropZone'),
          fileTbody = document.getElementById('fileTbody'), convertBtn = document.getElementById('convertBtn'),
          stopBtn = document.getElementById('stopBtn'), regexInput = document.getElementById('regexInput'),
          regexStatus = document.getElementById('regexStatus'), statusText = document.getElementById('status'),
          progFill = document.getElementById('progFill'), progBar = document.getElementById('progBar'),
          optToc = document.getElementById('optToc'), regexContainer = document.getElementById('regexContainer');

    // 목차 UI 토글
    function updateTocUI() {
        const enabled = optToc.checked;
        regexInput.disabled = !enabled;
        document.querySelectorAll('.btn-preset').forEach(btn => btn.disabled = !enabled);
        regexContainer.classList.toggle('disabled', !enabled);
        if (enabled) validateRegex();
        else { regexStatus.innerText = "사용 안 함"; regexStatus.style.color = "var(--text-dim)"; }
    }
    optToc.onchange = updateTocUI;

    function validateRegex() {
        if (!optToc.checked) return true;
        try { new RegExp(regexInput.value); regexStatus.innerText = "정상"; regexStatus.style.color = "var(--success)"; return true; }
        catch(e) { regexStatus.innerText = "문법 오류"; regexStatus.style.color = "var(--danger)"; return false; }
    }
    regexInput.oninput = validateRegex;

    document.querySelectorAll('.btn-preset').forEach(btn => {
        btn.onclick = () => { regexInput.value = btn.dataset.reg; validateRegex(); };
    });

    // 파일 로직
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { handleFiles(e.target.files); fileInput.value = ""; };
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); };

    async function handleFiles(files) {
        for (const file of Array.from(files)) {
            if (!file.name.toLowerCase().endsWith('.txt')) continue;
            const buffer = await file.slice(0, 32768).arrayBuffer();
            let binary = ""; new Uint8Array(buffer).forEach(b => binary += String.fromCharCode(b));
            let det = jschardet.detect(binary);
            let enc = (det && det.confidence > 0.7) ? det.encoding.toUpperCase() : 'UTF-8';
            if (["EUC-KR", "WINDOWS-1252"].includes(enc)) enc = "CP949";
            fileQueue.push({ file: file, customTitle: file.name.replace(/\.[^/.]+$/, ""), encoding: enc, state: 'wait' });
        }
        renderList();
    }

    function renderList() {
        fileTbody.innerHTML = '';
        fileQueue.forEach((item, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${item.customTitle}" oninput="fileQueue[${i}].customTitle=this.value" style="background:none; border:none; color:var(--text); width:95%; outline:none;"></td>
                <td><select onchange="fileQueue[${i}].encoding=this.value" style="background:none; border:none; color:var(--accent); font-size:0.75rem;">
                    ${["UTF-8","CP949","EUC-KR","UTF-16LE"].map(e => `<option value="${e}" ${item.encoding===e?'selected':''}>${e}</option>`).join('')}
                </select></td>
                <td style="text-align:center;"><span class="status-badge badge-${item.state}">${item.state==='done'?'완료':'대기'}</span></td>
                <td><button onclick="fileQueue.splice(${i},1);renderList();" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button></td>
            `;
            fileTbody.appendChild(tr);
        });
    }

    // EPUB 변환 코어
    async function createEpub(title, content, useTrim, useAutoToc, userRegex) {
        const zip = new JSZip();
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        zip.folder("META-INF").file("container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

        const rawLines = content.replace(/\r\n/g, '\n').split('\n');
        const chapters = [];
        let currentChapter = { title: "시작", lines: [] };
        const customRegex = useAutoToc ? new RegExp(userRegex, 'i') : null;

        for (let i = 0; i < rawLines.length; i++) {
            const line = rawLines[i].trim();
            if (useAutoToc && line && customRegex.test(line) && line.length < 50) {
                if (currentChapter.lines.length > 0) chapters.push(currentChapter);
                currentChapter = { title: line, lines: [] };
                continue;
            }
            if (line !== "") currentChapter.lines.push(line);
            else if (useTrim && i + 1 < rawLines.length && rawLines[i+1].trim() === "") {
                currentChapter.lines.push(""); while (i+1 < rawLines.length && rawLines[i+1].trim() === "") i++;
            } else if (!useTrim) currentChapter.lines.push("");
        }
        chapters.push(currentChapter);

        const oebps = zip.folder("OEBPS");
        const manifest = [], spine = [], nav = [], ncx = [];

        chapters.forEach((ch, idx) => {
            const fname = `ch_${idx}.xhtml`;
            const body = ch.lines.map(l => l ? `<p>${l.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}</p>` : `<p><br/></p>`).join('\n');
            const html = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko"><head><title>${ch.title}</title><style>body{font-family:sans-serif;line-height:1.7;padding:5% 7%;word-break:break-all;}</style></head><body><h2 id="p${idx}">${ch.title}</h2>${body}</body></html>`;
            oebps.file(fname, html);
            manifest.push(`<item id="c${idx}" href="${fname}" media-type="application/xhtml+xml"/>`);
            spine.push(`<itemref idref="c${idx}"/>`);
            nav.push(`<li><a href="${fname}#p${idx}">${ch.title}</a></li>`);
            ncx.push(`<navPoint id="n${idx}" playOrder="${idx+1}"><navLabel><text>${ch.title}</text></navLabel><content src="${fname}"/></navPoint>`);
        });

        oebps.file("nav.xhtml", `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops"><head><title>TOC</title></head><body><nav epub:type="toc"><h1>목차</h1><ol>${nav.join('\n')}</ol></nav></body></html>`);
        oebps.file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="uuid"/><meta name="dtb:depth" content="1"/></head><docTitle><text>${title}</text></docTitle><navMap>${ncx.join('\n')}</navMap></ncx>`);
        oebps.file("content.opf", `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="uid">u${crypto.randomUUID()}</dc:identifier><dc:title>${title}</dc:title><dc:language>ko</dc:language><meta property="dcterms:modified">${new Date().toISOString().replace(/\.\d+Z$/,"Z")}</meta></metadata><manifest><item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>${manifest.join('\n')}</manifest><spine toc="ncx">${spine.join('\n')}</spine></package>`);

        return await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip", compression: "DEFLATE" });
    }

    convertBtn.onclick = async () => {
        if (!validateRegex() || isProcessing || fileQueue.length === 0) return;
        isProcessing = true; shouldStop = false;
        convertBtn.disabled = true; stopBtn.style.display = 'block'; progBar.style.display = 'block';

        const regValue = regexInput.value, useTrim = document.getElementById('optTrim').checked,
              useAutoToc = optToc.checked, useZip = document.getElementById('optZip').checked;
        const finalZip = useZip ? new JSZip() : null;
        let count = 0;

        for (let i = 0; i < fileQueue.length; i++) {
            if (shouldStop) break;
            const item = fileQueue[i]; if (item.state === 'done') continue;
            statusText.innerText = `변환 중: ${item.customTitle}`;
            progFill.style.width = `${((i+1)/fileQueue.length)*100}%`;
            try {
                const text = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsText(item.file, item.encoding); });
                const blob = await createEpub(item.customTitle, text, useTrim, useAutoToc, regValue);
                if (useZip) finalZip.file(`${item.customTitle}.epub`, blob);
                else { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${item.customTitle}.epub`; a.click(); }
                item.state = 'done'; count++; renderList();
            } catch (e) { item.state = 'stop'; renderList(); }
        }

        if (useZip && count > 0) {
            const zipBlob = await finalZip.generateAsync({ type: "blob" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(zipBlob); a.download = `EPUB_COLLECTION.zip`; a.click();
        }
        statusText.innerText = shouldStop ? "중단됨" : `✅ 변환 완료 (${count}개)`;
        isProcessing = false; convertBtn.disabled = false; stopBtn.style.display = 'none';
    };

    stopBtn.onclick = () => shouldStop = true;
    document.getElementById('clearDoneBtn').onclick = () => { fileQueue = fileQueue.filter(f => f.state !== 'done'); renderList(); };
    document.getElementById('sortHeader').onclick = () => {
        currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
        fileQueue.sort((a,b) => a.customTitle.localeCompare(b.customTitle, undefined, {numeric:true}) * (currentSortDir === 'asc' ? 1 : -1));
        renderList();
    };
    updateTocUI();
</script>
</body>
</html>
